# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
# We aim for OSI-permissive only and no unmaintained or vulnerable crates.

[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
]
exceptions = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = [
  { crate = "foldhash@0.1.5", reason = "sqlx-core transitively pins hashbrown 0.15.x" },
  { crate = "getrandom@0.2.17", reason = "ring and rand 0.8 still require getrandom 0.2.x" },
  { crate = "getrandom@0.3.4", reason = "jsonschema and rand 0.9 still require getrandom 0.3.x" },
  { crate = "hashbrown@0.15.5", reason = "sqlx-core transitively pins hashbrown 0.15.x" },
  { crate = "hashbrown@0.16.1", reason = "jsonschema transitively pins hashbrown 0.16.x" },
  { crate = "r-efi@5.3.0", reason = "getrandom 0.3.x transitively pins r-efi 5.x" },
  { crate = "redox_syscall@0.5.18", reason = "parking_lot_core and referencing still require redox_syscall 0.5.x" },
  { crate = "windows-sys@0.48.0", reason = "sqlx-postgres transitively pins windows-sys 0.48.x via etcetera" },
  { crate = "windows-sys@0.52.0", reason = "ring transitively pins windows-sys 0.52.x" },
  { crate = "windows-targets@0.48.5", reason = "sqlx-postgres transitively pins windows-targets 0.48.x via etcetera" },
  { crate = "windows-targets@0.52.6", reason = "ring transitively pins windows-targets 0.52.x" },
  { crate = "windows_aarch64_gnullvm@0.48.5", reason = "paired with windows-targets 0.48.x" },
  { crate = "windows_aarch64_gnullvm@0.52.6", reason = "paired with windows-targets 0.52.x" },
  { crate = "windows_aarch64_msvc@0.48.5", reason = "paired with windows-targets 0.48.x" },
  { crate = "windows_aarch64_msvc@0.52.6", reason = "paired with windows-targets 0.52.x" },
  { crate = "windows_i686_gnu@0.48.5", reason = "paired with windows-targets 0.48.x" },
  { crate = "windows_i686_gnu@0.52.6", reason = "paired with windows-targets 0.52.x" },
  { crate = "windows_i686_msvc@0.48.5", reason = "paired with windows-targets 0.48.x" },
  { crate = "windows_i686_msvc@0.52.6", reason = "paired with windows-targets 0.52.x" },
  { crate = "windows_x86_64_gnu@0.48.5", reason = "paired with windows-targets 0.48.x" },
  { crate = "windows_x86_64_gnu@0.52.6", reason = "paired with windows-targets 0.52.x" },
  { crate = "windows_x86_64_gnullvm@0.48.5", reason = "paired with windows-targets 0.48.x" },
  { crate = "windows_x86_64_gnullvm@0.52.6", reason = "paired with windows-targets 0.52.x" },
  { crate = "windows_x86_64_msvc@0.48.5", reason = "paired with windows-targets 0.48.x" },
  { crate = "windows_x86_64_msvc@0.52.6", reason = "paired with windows-targets 0.52.x" },
  { crate = "wit-bindgen@0.51.0", reason = "uuid and tempfile still transitively pin wit-bindgen 0.51.x" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
