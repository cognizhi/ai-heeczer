services:
  ollama:
    image: ollama/ollama:0.21.2
    profiles: ["local-model"]
    ports:
      - "127.0.0.1:${HEECZER_OLLAMA_PORT}:11434"
    volumes:
      - heeczer-ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  heeczer-ollama:
    name: heeczer-test-${HEECZER_STACK}-ollama
