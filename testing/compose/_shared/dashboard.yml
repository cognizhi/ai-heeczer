services:
  dashboard:
    build:
      context: ${HEECZER_REPO_ROOT}/dashboard
      dockerfile: Dockerfile.dev
    depends_on:
      heeczer-ingest:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_INGEST_URL: http://127.0.0.1:${HEECZER_INGEST_PORT}
      HEECZER_DASHBOARD_ROLE: analyst
    ports:
      - "127.0.0.1:${HEECZER_DASHBOARD_PORT}:3000"
