# gitleaks configuration. See https://github.com/gitleaks/gitleaks
title = "ai-heeczer gitleaks"

# Inherit upstream rule set so we keep parity with the action defaults.
[extend]
useDefault = true

# Allowlist policy
# ----------------
# We deliberately do NOT path-allowlist the entire docs/ tree (foundation
# backlog item: previous globs would hide a future leaked secret in product
# docs). Only generated build outputs are skipped wholesale; everything else
# is subject to the upstream default rule set.
#
# Pattern-based allowlists silence noisy fixture/example placeholders without
# blanket-skipping a directory.

[allowlist]
description = "Generated build artefacts only; never source or docs"
paths = [
  '''target/''',
  '''node_modules/''',
  '''dist/''',
  '''\.pnpm-store/''',
  # The fixture tree contains canonical UUID/correlation-id strings that the
  # generic-api-key rule otherwise flags. Anything that *looks* like a real
  # cloud-provider secret is still detected by its provider-specific rule.
  '''core/schema/fixtures/''',
]
# Quiet known-safe placeholder patterns wherever they appear. All carry the
# literal token EXAMPLE so a real key never matches.
regexes = [
  '''AKIA[0-9A-Z]{0,20}EXAMPLE''',
  '''ghp_[A-Za-z0-9]{0,36}EXAMPLE''',
  '''xox[bpoa]-[A-Za-z0-9-]+EXAMPLE''',
  '''sk-[A-Za-z0-9]{0,40}EXAMPLE''',
]
