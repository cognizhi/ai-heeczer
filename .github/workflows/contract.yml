name: contract

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All third-party Actions are pinned to a 40-char commit SHA per
# docs/agents/AGENT_HARNESS.md §5 and the foundation backlog. Dependabot
# (.github/dependabot.yml) keeps these current. The `# vX.Y.Z` comment is the
# resolved tag for human review only — Dependabot edits both the SHA and tag.
jobs:
  schema-contract:
    name: schema contract validation (ADR-0002, ADR-0003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: build heec CLI for fixture validation
        run: cargo build -p heeczer-cli --release
      - name: validate fixtures against event.v1.json
        run: |
          for f in core/schema/fixtures/events/valid/*.json; do
            echo "» validating $f"
            ./target/release/heec schema validate "$f"
          done
      - name: schema validation tests
        run: cargo test -p heeczer-core --test schema_validation
      - name: golden scoring tests
        run: cargo test -p heeczer-core --test golden_scoring
