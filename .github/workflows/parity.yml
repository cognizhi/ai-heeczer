name: parity

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: parity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All third-party Actions are pinned to a 40-char commit SHA per
# docs/agents/AGENT_HARNESS.md §5 and the foundation backlog. Dependabot
# (.github/dependabot.yml) keeps these current. The `# vX.Y.Z` comment is the
# resolved tag for human review only — Dependabot edits both the SHA and tag.
jobs:
  # Step 1: build the Rust reference scorer and validate fixture outputs.
  rust-reference:
    name: Rust reference scorer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: build heec CLI
        run: cargo build -p heeczer-cli --release
      - name: score fixtures → /tmp/parity/
        run: |
          mkdir -p /tmp/parity
          for f in core/schema/fixtures/events/valid/*.json; do
            name=$(basename "$f" .json)
            echo "» scoring $f → /tmp/parity/${name}.json"
            ./target/release/heec score "$f" --format json > "/tmp/parity/${name}.json"
          done
          echo "Scored $(ls /tmp/parity/*.json | wc -l) fixture(s)"

  # Step 2: JS/TS SDK parity — validates ingest paths via httptest.
  parity-js:
    name: JS SDK parity (@cognizhi/heeczer-sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 9.15.4
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: bindings/heeczer-js/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: bindings/heeczer-js
      - run: pnpm test
        working-directory: bindings/heeczer-js

  # Step 3: Python SDK parity — validates ingest paths via pytest + httptest.
  parity-python:
    name: Python SDK parity (heeczer-py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
      # release-please uses "-SNAPSHOT" placeholders which violate PEP 440.
      # Normalise to ".dev0" so uv can parse the version on pre-release branches.
      - name: normalize snapshot version (PEP 440)
        run: sed -i 's/-SNAPSHOT/.dev0/' pyproject.toml
        working-directory: bindings/heeczer-py
      - run: uv sync --all-extras
        working-directory: bindings/heeczer-py
      - run: uv run pytest
        working-directory: bindings/heeczer-py

  # Step 4: Go SDK parity — validates ingest paths via httptest.
  parity-go:
    name: Go SDK parity (heeczer-go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.26"
          cache-dependency-path: bindings/heeczer-go/go.mod
      - run: go test ./...
        working-directory: bindings/heeczer-go
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: bindings/heeczer-go

  # Step 5: Java SDK parity — validates ingest paths via WireMock.
  parity-java:
    name: Java SDK parity (heeczer-java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -q test
        working-directory: bindings/heeczer-java
