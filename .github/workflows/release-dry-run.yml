name: release-dry-run

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-dry-run-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All third-party Actions are pinned to a 40-char commit SHA per
# docs/agents/AGENT_HARNESS.md §5 and the foundation backlog. Dependabot
# (.github/dependabot.yml) keeps these current. The `# vX.Y.Z` comment is the
# resolved tag for human review only — Dependabot edits both the SHA and tag.
jobs:
  release-please-dry-run:
    name: release-please (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: release-please release-pr --dry-run
        run: |
          npx --yes release-please@17.6.0 release-pr \
            --token="${GITHUB_TOKEN}" \
            --repo-url="${GITHUB_REPOSITORY}" \
            --target-branch="${GITHUB_BASE_REF:-main}" \
            --config-file=.github/release-please-config.json \
            --manifest-file=.github/release-please-manifest.json \
            --dry-run \
            --trace
        env:
          GITHUB_TOKEN: ${{ github.token }}

  rust-publish-dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: cargo publish --dry-run (heeczer-core)
        run: cargo publish -p heeczer-core --dry-run
      # heeczer (rs binding) depends on heeczer-core; dry-run packaging of
      # heeczer requires heeczer-core to already exist in the crates.io index.
      # We validate heeczer-core here; the full chain is tested in release.yml.
      - name: list packaged files (heeczer)
        run: cargo package -p heeczer --list --no-verify

  npm-pack-dry-run:
    name: pnpm pack (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: bindings/heeczer-js/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: bindings/heeczer-js
      - run: pnpm run build
        working-directory: bindings/heeczer-js
      - run: pnpm publish --dry-run --no-git-checks
        working-directory: bindings/heeczer-js

  pypi-build-dry-run:
    name: uv build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
        working-directory: bindings/heeczer-py
      - run: uv build
        working-directory: bindings/heeczer-py
      - run: uv tool run twine check dist/*
        working-directory: bindings/heeczer-py

  go-module-tag-dry-run:
    name: Go module tag dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: bindings/heeczer-go/go.mod
      - name: validate module path and canonical tag shape
        run: |
          module_path="$(GOWORK=off go list -m)"
          test "${module_path}" = "github.com/cognizhi/ai-heeczer/bindings/heeczer-go"
          version="$(jq -r '."bindings/heeczer-go"' ../../.github/release-please-manifest.json)"
          canonical_tag="bindings/heeczer-go/v${version}"
          git check-ref-format "refs/tags/${canonical_tag}"
          echo "would publish Go module tag ${canonical_tag}"
        working-directory: bindings/heeczer-go
      - run: go test ./...
        working-directory: bindings/heeczer-go

  maven-central-dry-run:
    name: maven deploy (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: generate ephemeral gpg key
        env:
          GPG_PASSPHRASE: dry-run-passphrase
        run: |
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --quick-generate-key "ai-heeczer release dry-run <release-dry-run@example.invalid>" rsa3072 sign 0
          gpg --batch --list-secret-keys --keyid-format LONG
      - name: maven deploy dry run (skip central publish)
        env:
          GPG_PASSPHRASE: dry-run-passphrase
        run: >-
          mvn -B -ntp deploy -DskipTests -DskipPublishing=true
          -Dgpg.passphrase=${GPG_PASSPHRASE}
        working-directory: bindings/heeczer-java
