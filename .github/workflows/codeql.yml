name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

# All third-party Actions pinned to a 40-char SHA per AGENT_HARNESS §5.
jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Rust isn't natively supported by CodeQL. JS/Python/Go/Java are
        # analysed as their SDKs are present. Keep in sync with plans 0005-0009.
        language: ["actions", "javascript-typescript", "python", "go", "java"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          languages: ${{ matrix.language }}
      - if: matrix.language == 'java'
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: bindings/heeczer-go/go.mod
      - if: matrix.language == 'java'
        run: mvn -q -DskipTests compile
        working-directory: bindings/heeczer-java
      - uses: github/codeql-action/analyze@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
