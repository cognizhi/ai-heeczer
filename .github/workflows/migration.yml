name: migration

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: migration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All third-party Actions are pinned to a 40-char commit SHA per
# docs/agents/AGENT_HARNESS.md §5 and the foundation backlog. Dependabot
# (.github/dependabot.yml) keeps these current. The `# vX.Y.Z` comment is the
# resolved tag for human review only — Dependabot edits both the SHA and tag.
jobs:
  storage-sqlite:
    name: storage migration (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: run storage tests (SQLite)
        run: cargo test -p heeczer-storage
      # PostgreSQL integration tests are not yet wired (migrations-pg/ exists
      # but the test harness hasn't been connected). Validate the files exist
      # so the gap is visible and the workflow can be extended when ready.
      - name: verify PostgreSQL migration files exist
        run: |
          test -d core/heeczer-storage/migrations-pg \
            || { echo "migrations-pg directory missing"; exit 1; }
          count=$(find core/heeczer-storage/migrations-pg -name "*.sql" | wc -l)
          echo "Found ${count} migration file(s) in migrations-pg/"
          [ "$count" -gt 0 ] \
            || { echo "No migration files found in migrations-pg/"; exit 1; }
