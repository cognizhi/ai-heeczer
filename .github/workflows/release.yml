name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "heeczer-js-v[0-9]+.[0-9]+.[0-9]+"
      - "heeczer-py-v[0-9]+.[0-9]+.[0-9]+"
      - "heeczer-go-v[0-9]+.[0-9]+.[0-9]+"
      - "heeczer-java-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write  # required for OIDC trusted publishing (PyPI, npm, cosign)
  packages: write  # required for GHCR

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Rust workspace ────────────────────────────────────────────────────────────
  build-rust:
    name: build + test (Rust)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace --all-targets
      - run: cargo build --workspace --release

  publish-crates:
    name: publish (crates.io)
    needs: build-rust
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: publish heeczer-core
        run: cargo publish -p heeczer-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: publish heeczer (Rust SDK)
        run: cargo publish -p heeczer
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── JS/TS SDK ─────────────────────────────────────────────────────────────────
  publish-npm:
    name: publish (@heeczer/sdk → npm)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'heeczer-js-v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
        working-directory: bindings/heeczer-js
      - run: npm test
        working-directory: bindings/heeczer-js
      - run: npm publish --provenance --access public
        working-directory: bindings/heeczer-js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Python SDK ────────────────────────────────────────────────────────────────
  publish-pypi:
    name: publish (heeczer → PyPI)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'heeczer-py-v')
    environment: pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.2
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
        working-directory: bindings/heeczer-py
      - run: uv run pytest
        working-directory: bindings/heeczer-py
      - run: uv build
        working-directory: bindings/heeczer-py
      - name: publish (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdbc # v1.12.4
        with:
          packages-dir: bindings/heeczer-py/dist/

  # ── Go SDK ────────────────────────────────────────────────────────────────────
  tag-go:
    name: tag (heeczer-go)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'heeczer-go-v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22"
          cache-dependency-path: bindings/heeczer-go/go.sum
      - run: go test ./...
        working-directory: bindings/heeczer-go
      # Go modules are versioned via git tags; no further publish step needed.

  # ── Java SDK ──────────────────────────────────────────────────────────────────
  publish-maven:
    name: publish (heeczer-sdk → Maven Central)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'heeczer-java-v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - run: mvn -q test
        working-directory: bindings/heeczer-java
      - run: mvn -q deploy -DskipTests
        working-directory: bindings/heeczer-java
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-rust]
    if: startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
