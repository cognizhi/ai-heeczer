name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "heeczer-js-v[0-9]+.[0-9]+.[0-9]+"
      - "heeczer-py-v[0-9]+.[0-9]+.[0-9]+"
      - "heeczer-go-v[0-9]+.[0-9]+.[0-9]+"
      - "heeczer-java-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write # required for OIDC trusted publishing (PyPI, npm, cosign)
  packages: write # required for GHCR

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Rust workspace ────────────────────────────────────────────────────────────
  build-rust:
    name: build + test (Rust)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo test --workspace --all-targets
      - run: cargo build --workspace --release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: heec-linux-x64
          path: target/release/heec

  generate-sbom:
    name: generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [build-rust]
    if: startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: sbom-cyclonedx.xml
          format: cyclonedx-xml
          output-file: sbom-cyclonedx.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.xml

  sign-artifacts:
    name: sign artifacts (cosign keyless)
    runs-on: ubuntu-latest
    needs: [build-rust]
    if: startsWith(github.ref_name, 'v')
    permissions:
      contents: read
      id-token: write # required for keyless OIDC signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: heec-linux-x64
          path: dist/
      - name: sign heec binary
        run: cosign sign-blob --yes dist/heec --bundle dist/heec.cosign.bundle
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: heec-signed
          path: dist/

  publish-crates:
    name: publish (crates.io)
    needs: build-rust
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: package check (heeczer-core)
        run: cargo publish -p heeczer-core --dry-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: list packaged files (heeczer-core)
        run: cargo package -p heeczer-core --list

      - name: list packaged files (heeczer)
        run: cargo package -p heeczer --list
      - name: publish heeczer-core
        run: cargo publish -p heeczer-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: wait for heeczer-core to appear
        run: |
          for i in {1..30}; do
            cargo search heeczer-core --limit 1 | grep heeczer-core && exit 0
            sleep 10
          done
          echo "heeczer-core did not appear in index in time"
          exit 1
      - name: package check (heeczer)
        run: cargo publish -p heeczer --dry-run --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: publish heeczer (Rust SDK)
        run: cargo publish -p heeczer
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── JS/TS SDK ─────────────────────────────────────────────────────────────────
  publish-npm:
    name: publish (@cognizhi/heeczer-sdk → npm)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'heeczer-js-v')
    environment: publish
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: bindings/heeczer-js/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
        working-directory: bindings/heeczer-js
      - run: pnpm test
        working-directory: bindings/heeczer-js
      - run: pnpm run build
        working-directory: bindings/heeczer-js
      - run: npm publish --provenance --access public
        working-directory: bindings/heeczer-js

  # ── Python SDK ────────────────────────────────────────────────────────────────
  publish-pypi:
    name: publish (cognizhi-heeczer → PyPI)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'heeczer-py-v')
    environment: publish
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
        working-directory: bindings/heeczer-py
      - run: uv run pytest
        working-directory: bindings/heeczer-py
      - run: uv build
        working-directory: bindings/heeczer-py
      - run: uv tool run twine check dist/*
        working-directory: bindings/heeczer-py
      - name: publish (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: bindings/heeczer-py/dist/

  # ── Go SDK ────────────────────────────────────────────────────────────────────
  tag-go:
    name: tag (heeczer-go)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'heeczer-go-v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: bindings/heeczer-go/go.mod
      - run: go test ./...
        working-directory: bindings/heeczer-go
      # Go modules are versioned via git tags; no further publish step needed.

  # ── Java SDK ──────────────────────────────────────────────────────────────────
  publish-maven:
    name: publish (heeczer-sdk → Maven Central)
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'heeczer-java-v')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - run: mvn -B -ntp test
        working-directory: bindings/heeczer-java

      - run: mvn -B -ntp deploy -DskipTests
        working-directory: bindings/heeczer-java
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-rust, generate-sbom, sign-artifacts]
    if: startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-cyclonedx
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: heec-signed
          path: dist/
      - uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/heec
            dist/heec.cosign.bundle
            dist/sbom-cyclonedx.xml
