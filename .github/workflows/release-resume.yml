name: release-resume

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target to resume"
        required: true
        default: "all"
        type: choice
        options:
          - rust
          - npm
          - pypi
          - go
          - java
          - all
      tag:
        description: "Release tag to resume from (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write # required for OIDC trusted publishing (PyPI, npm, cosign)
  packages: write # required for GHCR

# Shares the per-tag release concurrency group so a resume cannot race the same live release.
concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

# All third-party Actions are pinned to a 40-char commit SHA per
# docs/agents/AGENT_HARNESS.md §5 and the foundation backlog. Dependabot
# (.github/dependabot.yml) keeps these current. The `# vX.Y.Z` comment is the
# resolved tag for human review only — Dependabot edits both the SHA and tag.
jobs:
  # ── Rust workspace ────────────────────────────────────────────────────────────
  resume-rust:
    name: resume publish (crates.io)
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'rust' || inputs.target == 'all' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: publish heeczer-core if needed
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "heeczer-core") | .version')"
          if curl -fsSL -H "User-Agent: cognizhi-ai-heeczer-release-resume" "https://crates.io/api/v1/crates/heeczer-core/${version}" >/dev/null; then
            echo "heeczer-core ${version} is already published"
            exit 0
          fi
          cargo publish -p heeczer-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: wait for heeczer-core to appear
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "heeczer-core") | .version')"
          for i in {1..30}; do
            curl -fsSL -H "User-Agent: cognizhi-ai-heeczer-release-resume" "https://crates.io/api/v1/crates/heeczer-core/${version}" >/dev/null && exit 0
            sleep 10
          done
          echo "heeczer-core ${version} did not appear in index in time"
          exit 1
      - name: publish heeczer if needed
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "heeczer") | .version')"
          if curl -fsSL -H "User-Agent: cognizhi-ai-heeczer-release-resume" "https://crates.io/api/v1/crates/heeczer/${version}" >/dev/null; then
            echo "heeczer ${version} is already published"
            exit 0
          fi
          cargo publish -p heeczer
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── JS/TS SDK ─────────────────────────────────────────────────────────────────
  resume-npm:
    name: resume publish (@cognizhi/heeczer-sdk → npm)
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'npm' || inputs.target == 'all' }}
    environment: publish
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: bindings/heeczer-js/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
        working-directory: bindings/heeczer-js
      - run: pnpm run build
        working-directory: bindings/heeczer-js
      - run: npm publish --provenance --access public
        working-directory: bindings/heeczer-js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

  # ── Python SDK ────────────────────────────────────────────────────────────────
  resume-pypi:
    name: resume publish (cognizhi-heeczer → PyPI)
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'pypi' || inputs.target == 'all' }}
    environment: publish
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
      - run: uv build
        working-directory: bindings/heeczer-py
      - name: publish (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: bindings/heeczer-py/dist/

  # ── Go SDK ────────────────────────────────────────────────────────────────────
  resume-go:
    name: resume tag (heeczer-go)
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'go' || inputs.target == 'all' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: bindings/heeczer-go/go.mod
      - run: go test ./...
        working-directory: bindings/heeczer-go
      - name: create or verify canonical Go module tag
        run: |
          input_tag="${{ inputs.tag }}"
          case "${input_tag}" in
            v*) version="${input_tag#v}" ;;
            heeczer-go-v*) version="${input_tag#heeczer-go-v}" ;;
            bindings/heeczer-go/v*) version="${input_tag#bindings/heeczer-go/v}" ;;
            *)
              echo "Go resume expects vX.Y.Z, heeczer-go-vX.Y.Z, or bindings/heeczer-go/vX.Y.Z, got ${input_tag}" >&2
              exit 1
              ;;
          esac
          canonical_tag="bindings/heeczer-go/v${version}"
          head_sha="$(git rev-parse HEAD)"
          existing_sha="$(git ls-remote --tags origin "refs/tags/${canonical_tag}" | awk '{print $1}')"
          if [[ -n "${existing_sha}" ]]; then
            if [[ "${existing_sha}" != "${head_sha}" ]]; then
              echo "${canonical_tag} already points at ${existing_sha}, expected ${head_sha}" >&2
              exit 1
            fi
            echo "${canonical_tag} already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${canonical_tag}" "${head_sha}"
          git push origin "refs/tags/${canonical_tag}"

  # ── Java SDK ──────────────────────────────────────────────────────────────────
  resume-java:
    name: resume publish (heeczer-sdk → Maven Central)
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'java' || inputs.target == 'all' }}
    environment: publish
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - run: mvn -B -ntp deploy -DskipTests
        working-directory: bindings/heeczer-java
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
